app = "cleancave"
primary_region = "iad"

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "cleancave_data"
  destination = "/data"

[env]
  NODE_ENV = "production"
  DATA_DIR = "/data"
