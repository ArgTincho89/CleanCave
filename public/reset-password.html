<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CleanCave — Nueva contraseña</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="view centered">
    <div class="card login-card">
      <h1>🧹 CleanCave</h1>
      <p class="subtitle">Elegí tu nueva contraseña</p>

      <form id="form-reset">
        <label>Contraseña nueva
          <input type="password" id="reset-password" required minlength="4">
        </label>
        <label>Repetila
          <input type="password" id="reset-password-confirm" required minlength="4">
        </label>
        <button type="submit" class="btn primary">Guardar contraseña</button>
        <p class="error" id="reset-error"></p>
        <p class="success" id="reset-success"></p>
      </form>
      <p class="hint"><a href="/">Volver a CleanCave</a></p>
    </div>
  </div>

<script>
const params = new URLSearchParams(location.search);
const token = params.get('token');

document.getElementById('form-reset').addEventListener('submit', async e => {
  e.preventDefault();
  const errEl = document.getElementById('reset-error');
  const okEl = document.getElementById('reset-success');
  errEl.textContent = ''; okEl.textContent = '';

  const pass = document.getElementById('reset-password').value;
  const confirm = document.getElementById('reset-password-confirm').value;
  if (pass !== confirm) { errEl.textContent = 'Las contraseñas no coinciden.'; return; }
  if (!token) { errEl.textContent = 'Falta el link completo (token). Pedí uno nuevo desde el login.'; return; }

  try {
    const res = await fetch('/api/auth/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, newPassword: pass })
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || 'No se pudo cambiar la contraseña.');
    okEl.textContent = 'Listo, ya podés ingresar con tu contraseña nueva.';
    document.getElementById('form-reset').querySelector('button').disabled = true;
  } catch (err) {
    errEl.textContent = err.message;
  }
});
</script>
</body>
</html>
